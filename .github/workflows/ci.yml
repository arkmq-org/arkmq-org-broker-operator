name: CI

env:
  IMAGE_NAME: arkmq-org-broker-operator
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize, reopened]
  schedule:
    - cron:  '0 3 * * *'
  workflow_dispatch:
    inputs:
      skipTests:
        description: 'Skip Tests'
        required: false
        default: false
        type: boolean
      skipDOTests:
        description: 'Skip DO Tests'
        required: false
        default: false
        type: boolean
      runTutorials:
        description: 'Run tutorials'
        required: false
        default: false
        type: boolean
      trigger_release:
        description: 'Trigger release'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    name: Validate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          COMMIT_COUNT: ${{ github.event.pull_request.commits }}
          COMMIT_PATTERN: '^\[(NO-ISSUE|#[0-9]+)\] .+$'
        run: |
          git log --format=%s --max-count="$COMMIT_COUNT" --skip=1 | while IFS= read -r COMMIT_MESSAGE; do
            if [[ ! "$COMMIT_MESSAGE" =~ $COMMIT_PATTERN ]]; then
              echo "Invalid commit message: '$COMMIT_MESSAGE'"
              echo "Commit messages must start with '[NO-ISSUE]' or '[#NNN]', followed by a space and a description."
              exit 1
            fi
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false

      - name: Set up env
        run: |
          echo "HOSTNAME=${HOSTNAME}" >> ${GITHUB_ENV}
          echo `yq -V`

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "insecure-registries" : [ "${{env.HOSTNAME}}:5000" ]
            }

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Start minikube
        id: minikube
        uses: medyagh/setup-minikube@master
        with:
          cpus: 2
          memory: 8g
          addons: ingress
          insecure-registry: ${{env.HOSTNAME}}:5000

      - name: Enable minikube ingress-nginx ssl-passthrough
        run: >
          minikube kubectl -- patch deployment -n ingress-nginx ingress-nginx-controller --type='json' -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value":"--enable-ssl-passthrough"}]'

      - name: Check go.mod and go.sum files
        run: go mod tidy && git status && git diff-index --quiet HEAD --

      - name: Check generate files
        run: make build && make generate-deploy && make bundle && make helm-charts && git status && git diff && git diff-index --quiet HEAD --

      - name: Build the image
        run: |
          podman build --build-arg TARGETOS=linux --build-arg TARGETARCH=amd64 --label git-sha=$GITHUB_SHA --no-cache --platform linux/amd64 --manifest $IMAGE_NAME:dev.latest .

      - name: Push the image into minikube
        run: |
          podman tag $IMAGE_NAME:dev.latest ${HOSTNAME}:5000/$IMAGE_NAME:dev.latest
          podman push --tls-verify=false ${HOSTNAME}:5000/$IMAGE_NAME:dev.latest

      - name: Install cert-manager and trust-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade -i -n cert-manager cert-manager jetstack/cert-manager --set installCRDs=true --create-namespace --wait
          helm upgrade -i -n cert-manager trust-manager jetstack/trust-manager --set secretTargets.enabled=true --set secretTargets.authorizedSecretsAll=true --wait
      
      - name: Install OLM
        run: |
          ./bin/operator-sdk olm install --version 0.32.0
          minikube kubectl -- wait pod -l app=catalog-operator --for=condition=Ready --namespace=olm --timeout=2m
          minikube kubectl -- wait pod -l app=olm-operator --for=condition=Ready --namespace=olm --timeout=2m
          minikube kubectl -- wait --for=condition=Established crd/catalogsources.operators.coreos.com --timeout=2m
          minikube kubectl -- wait --for=condition=Established crd/subscriptions.operators.coreos.com --timeout=2m

      - name: Execute tests
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && !inputs.skipTests }}
        run: IMG="${HOSTNAME}:5000/$IMAGE_NAME:dev.latest" make test-mk-v

      - name: Execute do tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skipDOTests }}
        run: IMG="${HOSTNAME}:5000/$IMAGE_NAME:dev.latest" make test-mk-do-v

      - name: Run helm-charts tests
        run: |
          helm install --set controllerManager.manager.image.repository=${HOSTNAME}:5000/$IMAGE_NAME --set controllerManager.manager.image.tag=dev.latest my-broker-operator --set crds.keep=false helm-charts/arkmq-org-broker-operator/
          helm uninstall my-broker-operator

      - name: Run scorecard tests
        run: make scorecard | tee scorecard.log && ! grep 'Suggestions' scorecard.log

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Checkout arkmq-org.github.io
        uses: actions/checkout@v6
        with:
          repository: arkmq-org/arkmq-org.github.io
          path: arkmq-org.github.io

      - name: Build the docs
        run: >
          rm -rf arkmq-org.github.io/docs &&
          cp -r docs arkmq-org.github.io &&
          rm -rf arkmq-org.github.io/examples &&
          cp -r examples arkmq-org.github.io &&
          cd arkmq-org.github.io &&
          npm install && npm run build

      - name: Set up QEMU
        if: ${{ github.event_name == 'push' }}
        uses: docker/setup-qemu-action@v4

      - name: Build the image for arm64
        if: ${{ github.event_name == 'push' }}
        run: |
          podman build --build-arg TARGETOS=linux --build-arg TARGETARCH=arm64 --label git-sha=$GITHUB_SHA --no-cache --platform linux/arm64 --manifest $IMAGE_NAME:dev.latest .

      - name: Push the dev image
        if: ${{ github.event_name == 'push' }}
        run: |
          podman login --username=${{ secrets.QUAY_USERNAME }} --password=${{ secrets.QUAY_PASSWORD }} quay.io
          podman manifest push $IMAGE_NAME:dev.latest docker://quay.io/${{ secrets.QUAY_NAMESPACE }}/$IMAGE_NAME:dev.latest

      - name: Resolve dev.latest operand digests
        if: ${{ github.event_name == 'push' }}
        id: operand-digests
        run: |
          INIT_DIGEST="$(skopeo inspect docker://quay.io/arkmq-org/arkmq-org-broker-init:dev.latest | jq -r '.Digest')"
          KUBE_DIGEST="$(skopeo inspect docker://quay.io/arkmq-org/arkmq-org-broker-kubernetes:dev.latest | jq -r '.Digest')"
          echo "init=quay.io/arkmq-org/arkmq-org-broker-init@${INIT_DIGEST}" >> $GITHUB_OUTPUT
          echo "kube=quay.io/arkmq-org/arkmq-org-broker-kubernetes@${KUBE_DIGEST}" >> $GITHUB_OUTPUT
          echo "Resolved init: quay.io/arkmq-org/arkmq-org-broker-init@${INIT_DIGEST}"
          echo "Resolved kube: quay.io/arkmq-org/arkmq-org-broker-kubernetes@${KUBE_DIGEST}"

      - name: Push dev-latest helm chart
        if: ${{ github.event_name == 'push' }}
        env:
          DEV_INIT_IMAGE: ${{ steps.operand-digests.outputs.init }}
          DEV_KUBE_IMAGE: ${{ steps.operand-digests.outputs.kube }}
        run: |
          # Create a temporary copy for the dev chart
          cp -r helm-charts/arkmq-org-broker-operator helm-charts/arkmq-org-broker-operator-dev
          # Update version and image tag for dev-latest
          yq -i '.version="0.0.0-dev.latest"' helm-charts/arkmq-org-broker-operator-dev/Chart.yaml
          yq -i '.appVersion="dev.latest"' helm-charts/arkmq-org-broker-operator-dev/Chart.yaml
          yq -i '.controllerManager.manager.image.tag="dev.latest"' helm-charts/arkmq-org-broker-operator-dev/values.yaml
          yq -i '.controllerManager.manager.image.pullPolicy="Always"' helm-charts/arkmq-org-broker-operator-dev/values.yaml
          # Add dev.latest operand images as version 0.0.0 (digest-pinned)
          DEV_INIT_IMAGE="$DEV_INIT_IMAGE" yq -i '.controllerManager.manager.relatedImages.brokerInit000.digest=env(DEV_INIT_IMAGE)' helm-charts/arkmq-org-broker-operator-dev/values.yaml
          DEV_KUBE_IMAGE="$DEV_KUBE_IMAGE" yq -i '.controllerManager.manager.relatedImages.brokerKubernetes000.digest=env(DEV_KUBE_IMAGE)' helm-charts/arkmq-org-broker-operator-dev/values.yaml
          sed -i '/- name: OPERATOR_NAME/i\        - name: DEFAULT_BROKER_VERSION\n          value: "0.0.0"\n        - name: DEFAULT_BROKER_COMPACT_VERSION\n          value: "000"\n        - name: DEFAULT_BROKER_KUBE_IMAGE\n          value: {{ quote .Values.controllerManager.manager.relatedImages.brokerKubernetes000.digest }}\n        - name: DEFAULT_BROKER_INIT_IMAGE\n          value: {{ quote .Values.controllerManager.manager.relatedImages.brokerInit000.digest }}\n        - name: RELATED_IMAGE_BROKER_INIT_000\n          value: {{ quote .Values.controllerManager.manager.relatedImages.brokerInit000.digest }}\n        - name: RELATED_IMAGE_BROKER_KUBERNETES_000\n          value: {{ quote .Values.controllerManager.manager.relatedImages.brokerKubernetes000.digest }}' helm-charts/arkmq-org-broker-operator-dev/templates/deployment.yaml
          # Package and push
          helm package helm-charts/arkmq-org-broker-operator-dev/
          helm registry login --username=${{ secrets.QUAY_USERNAME }} --password=${{ secrets.QUAY_PASSWORD }} quay.io
          helm push arkmq-org-broker-operator-0.0.0-dev.latest.tgz oci://quay.io/${{ secrets.QUAY_NAMESPACE }}/helm-charts

      - name: Build the bundle image
        env:
          DEV_INIT_IMAGE: ${{ steps.operand-digests.outputs.init }}
          DEV_KUBE_IMAGE: ${{ steps.operand-digests.outputs.kube }}
        run: |
          IMG="${HOSTNAME}:5000/$IMAGE_NAME:dev.latest"
          CSV=bundle/manifests/arkmq-org-broker-operator.clusterserviceversion.yaml
          IMG="$IMG" yq -i '.metadata.annotations.containerImage=env(IMG)' "$CSV"
          IMG="$IMG" yq -i '.spec.install.spec.deployments[].spec.template.spec.containers[].image=env(IMG)' "$CSV"
          if [ -n "$DEV_INIT_IMAGE" ] && [ -n "$DEV_KUBE_IMAGE" ]; then
            # Add dev.latest overrides to bundle CSV
            yq -i '(.spec.install.spec.deployments[].spec.template.spec.containers[].env) += [{"name": "DEFAULT_BROKER_VERSION", "value": "0.0.0"}, {"name": "DEFAULT_BROKER_COMPACT_VERSION", "value": "000"}, {"name": "DEFAULT_BROKER_KUBE_IMAGE", "value": env(DEV_KUBE_IMAGE)}, {"name": "DEFAULT_BROKER_INIT_IMAGE", "value": env(DEV_INIT_IMAGE)}, {"name": "RELATED_IMAGE_BROKER_INIT_000", "value": env(DEV_INIT_IMAGE)}, {"name": "RELATED_IMAGE_BROKER_KUBERNETES_000", "value": env(DEV_KUBE_IMAGE)}]' "$CSV"
            # Add dev.latest overrides to kustomize overlay
            yq -i '(.spec.template.spec.containers[].env) += [{"name": "DEFAULT_BROKER_VERSION", "value": "0.0.0"}, {"name": "DEFAULT_BROKER_COMPACT_VERSION", "value": "000"}, {"name": "DEFAULT_BROKER_KUBE_IMAGE", "value": env(DEV_KUBE_IMAGE)}, {"name": "DEFAULT_BROKER_INIT_IMAGE", "value": env(DEV_INIT_IMAGE)}, {"name": "RELATED_IMAGE_BROKER_INIT_000", "value": env(DEV_INIT_IMAGE)}, {"name": "RELATED_IMAGE_BROKER_KUBERNETES_000", "value": env(DEV_KUBE_IMAGE)}]' config/manager/manager_related_images.yaml
          fi
          podman build --file bundle.Dockerfile --label git-sha=$GITHUB_SHA --tag $IMAGE_NAME-bundle:dev.latest .

      - name: Check the bundle image
        run: |
          echo 'Pushing the bundle image to local registry'
          CSV_VERSION=$(yq -r '.spec.version' bundle/manifests/arkmq-org-broker-operator.clusterserviceversion.yaml)
          podman tag $IMAGE_NAME-bundle:dev.latest ${HOSTNAME}:5000/$IMAGE_NAME-bundle:${CSV_VERSION}
          podman push --tls-verify=false ${HOSTNAME}:5000/$IMAGE_NAME-bundle:${CSV_VERSION}
          #
          echo 'Building and pushing catalog image'
          make BUNDLE_IMG=${HOSTNAME}:5000/$IMAGE_NAME-bundle:${CSV_VERSION} CATALOG_IMG=${HOSTNAME}:5000/arkmq-org-broker-operator-catalog:dev.latest OPM_FLAGS=--use-http catalog-build catalog-push
          #
          echo 'Creating and verifying catalog source'
          sed "s~image:.*~image: ${HOSTNAME}:5000/arkmq-org-broker-operator-catalog:dev.latest~" examples/catalog/catalog-source.yaml | minikube kubectl -- create -f -
          minikube kubectl -- wait catalogsource arkmq-org-broker-operator-catalog-source --for=jsonpath='{.status.connectionState.lastObservedState}'=READY --namespace=operators --timeout=3m ||
          (minikube kubectl -- get catalogsource arkmq-org-broker-operator-catalog-source --namespace operators -o yaml && exit 1)
          minikube kubectl -- wait pod -l olm.catalogSource=arkmq-org-broker-operator-catalog-source --for=condition=Ready --namespace=operators --timeout=3m ||
          (minikube kubectl -- describe pod -l olm.catalogSource=arkmq-org-broker-operator-catalog-source --namespace=operators && exit 1)
          #
          echo 'Creating and verifying subscription'
          minikube kubectl -- create -f ./examples/catalog/subscription.yaml
          minikube kubectl -- wait subscription arkmq-org-broker-operator-subscription --for=jsonpath='{.status.installplan.kind}'=InstallPlan --namespace=operators --timeout=3m ||
          (minikube kubectl -- get subscription arkmq-org-broker-operator-subscription --namespace=operators -o yaml && exit 1)
          minikube kubectl -- wait installplan -l operators.coreos.com/arkmq-org-broker-operator.operators='' --for=condition=Installed --namespace=operators --timeout=3m ||
          (minikube kubectl -- get installplan -l operators.coreos.com/arkmq-org-broker-operator.operators='' --namespace=operators -o yaml && exit 1)
          minikube kubectl -- wait pod -l name=arkmq-org-broker-operator --for=condition=Ready --namespace=operators --timeout=3m ||
          (minikube kubectl -- get pod -l name=arkmq-org-broker-operator --namespace=operators -o yaml && exit 1)

      - name: Push the bundle image
        if: ${{ github.event_name == 'push' }}
        run: |
          podman login --username=${{ secrets.QUAY_USERNAME }} --password=${{ secrets.QUAY_PASSWORD }} quay.io
          podman tag $IMAGE_NAME-bundle:dev.latest quay.io/${{ secrets.QUAY_NAMESPACE }}/$IMAGE_NAME-bundle:dev.latest
          podman push quay.io/${{ secrets.QUAY_NAMESPACE }}/$IMAGE_NAME-bundle:dev.latest

      - name: Get changed files in tutorials
        id: changed-tutorial-files
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47
        with:
          files: docs/tutorials/**

      - name: Install markdown-runner
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.runTutorials) || (github.event_name == 'pull_request' && steps.changed-tutorial-files.outputs.any_changed == 'true')
        run: go install github.com/arkmq-org/markdown-runner@latest

      - name: run the tutorials on the image
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.runTutorials) || (github.event_name == 'pull_request' && steps.changed-tutorial-files.outputs.any_changed == 'true')
        run: |
          minikube delete
          find docs/tutorials -type f -exec sed -i "s|^minikube start|minikube start  --cpus 2 --memory 8000 --insecure-registry=$HOSTNAME:5000|" {} +
          sed -i "s|image: quay.io/arkmq-org/arkmq-org-broker-operator:.*|image: ${HOSTNAME}:5000/$IMAGE_NAME:dev.latest|" deploy/operator.yaml
          markdown-runner docs/tutorials --view ci

      - name: Trigger release
        if: ${{ inputs.trigger_release }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              workflow_id: 'release.yml'
            });
